<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Твой Профиль | ECO-UZB</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .profile-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 90%; max-width: 400px; backdrop-filter: blur(20px); }
        .avatar { width: 100px; height: 100px; background: linear-gradient(45deg, #00f2fe, #4facfe); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: black; font-weight: 800; }
        .rank-badge { background: #00f2fe; color: black; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        h2 { margin: 10px 0; }
        .stats { display: flex; justify-content: space-around; margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .btn-back { display: inline-block; margin-top: 30px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="avatar">{{ user.name[0] }}</div>
        <span class="rank-badge">{{ user.get_rank() }}</span>
        <h2>{{ user.name }}</h2>
        <p style="color: #888;">Рады, что ты с нами!</p>
        
        <div class="stats">
            <div><div style="color: #00f2fe; font-weight: 800;">{{ user.points }}</div><small>Баллов</small></div>
            <div><div style="color: #00f2fe; font-weight: 800;">1</div><small>Акция</small></div>
        </div>

        <a href="/" class="btn-back">← Вернуться на главную</a>
    </div>
</body>
</html>
