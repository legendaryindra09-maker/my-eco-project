<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Эко-Лекторий | ECO-UZB</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg-dark: #050505; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: white; }
        nav { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo { font-weight: 800; font-size: 24px; color: var(--primary); text-decoration: none; }
        .logo span { color: white; }
        .btn-profile { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 14px; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 50px 20px; }
        .header-title { text-align: center; margin-bottom: 50px; }
        .header-title h1 { font-size: 36px; margin: 0; color: #fff; }
        .header-title p { color: #888; font-size: 16px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; text-decoration: none; color: white; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0, 242, 254, 0.1); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-date { color: var(--primary); font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .card h3 { margin: 0 0 15px 0; font-size: 20px; line-height: 1.4; }
        .card p { color: #aaa; font-size: 14px; line-height: 1.6; margin-bottom: 20px; flex-grow: 1; }
        .read-more { color: var(--primary); font-size: 14px; font-weight: 800; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">ECO<span>UZB</span></a>
        <div>
            <a href="/dashboard" class="btn-profile"><i class="fa-solid fa-user"></i> {{ user.name }}</a>
            <a href="/logout" style="margin-left: 20px; color: #666; text-decoration: none; font-size: 14px;">Выход</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-title">
            <h1>Эко-Лекторий</h1>
            <p>База знаний для волонтеров: читай, вдохновляйся, действуй.</p>
        </div>

        <div class="grid">
            {% for article in articles %}
            <a href="/article/{{ article.id }}" class="card">
                <img src="{{ article.image_url }}" alt="Обложка">
                <div class="card-body">
                    <div class="card-date">{{ article.date_added }}</div>
                    <h3>{{ article.title }}</h3>
                    <p>{{ article.summary }}</p>
                    <div class="read-more">Читать статью →</div>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
