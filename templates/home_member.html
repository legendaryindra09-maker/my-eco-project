<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Эко-Портал | Новости</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00f2fe; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; }
        nav { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--glass); border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; text-decoration: none; color: white; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .btn-profile { background: var(--primary); color: black; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: 800; color: var(--primary);">ECO-UZB</div>
        <div>
            <a href="/dashboard" class="btn-profile">Личный кабинет</a>
            <a href="/logout" style="margin-left: 20px; color: #666; text-decoration: none;">Выход</a>
        </div>
    </nav>
    <div class="container">
        <h1>Эко-Лекторий</h1>
        <div class="grid">
            {% for art in articles %}
            <a href="/article/{{ art.id }}" class="card">
                <img src="{{ art.image_url }}" alt="фото">
                <div class="card-content">
                    <small style="color: var(--primary);">{{ art.date_added }}</small>
                    <h3>{{ art.title }}</h3>
                    <p style="color: #888; font-size: 14px;">{{ art.summary }}</p>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
