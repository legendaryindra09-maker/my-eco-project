<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoVolunteer — Глобальный сбор</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2d6a4f; --accent: #74c69d; --bg: #f8fbf9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; text-align: center; color: #1b4332; }
        header { background: linear-gradient(135deg, #1b4332, var(--primary)); color: white; padding: 60px 20px; clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%); }
        .timer-box { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .timer-item { background: rgba(255,255,255,0.2); padding: 10px; border-radius: 10px; min-width: 70px; }
        .timer-item span { display: block; font-size: 1.8rem; font-weight: bold; }
        .container { max-width: 500px; margin: -40px auto 50px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .info-card { background: #e9f5ee; padding: 15px; border-radius: 15px; margin-bottom: 25px; text-align: left; border-left: 5px solid var(--primary); }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--accent); outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1b4332; transform: translateY(-2px); }
    </style>
</head>
<body>
    <header>
        <h1>{{ event.title }}</h1>
        <p><i class="fas fa-map-marker-alt"></i> {{ event.location }}</p>
        <div class="timer-box">
            <div class="timer-item"><span id="days">0</span>дн</div>
            <div class="timer-item"><span id="hours">0</span>час</div>
            <div class="timer-item"><span id="mins">0</span>мин</div>
        </div>
    </header>

    <div class="container">
        <div class="info-card">
            <h3 style="margin-top:0">О мероприятии:</h3>
            <p>{{ event.description }}</p>
        </div>

        <form action="/register" method="POST">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" name="name" placeholder="Иван" required>
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" name="phone" placeholder="+998..." required>
            </div>
            <div class="form-group">
                <label>Почему вы с нами?</label>
                <textarea name="email" placeholder="Напишите кратко..." rows="3" required></textarea>
            </div>
            <button type="submit">Присоединиться</button>
        </form>
    </div>

    <script>
        const targetDate = new Date("{{ event.date }}").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            }
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
