<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecovolunteering — Твой вклад в природу</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2d6a4f;
            --accent-color: #74c69d;
            --bg-color: #f8fbf9;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: #1b4332;
            margin: 0;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0% 100%);
        }
        header h1 { font-size: 3rem; margin: 0; letter-spacing: 1px; }
        header p { font-size: 1.2rem; opacity: 0.9; }

        .container {
            max-width: 600px;
            margin: -40px auto 50px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.07);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
        
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent-color); outline: none; }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button:hover {
            background-color: #1b4332;
            transform: translateY(-2px);
        }
        
        .footer-text {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-leaf"></i> Ecovolunteering</h1>
    <p>Маленькие шаги ведут к большим переменам</p>
</header>

<div class="container">
    <h2 style="text-align: center;">Стань частью команды</h2>
    
    <form action="/register" method="POST">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Как вас зовут?</label>
            <input type="text" name="name" placeholder="Например, Sherdor" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-phone"></i> Телефон для связи</label>
            <input type="tel" name="phone" placeholder="+998 (___) ___-__-__" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-comment-dots"></i> Твоя мотивация (кратко)</label>
            <textarea name="message" rows="3" placeholder="Почему ты хочешь помочь?"></textarea>
        </div>

        <button type="submit">
            Отправить заявку <i class="fas fa-arrow-right"></i>
        </button>
    </form>
    
    <p class="footer-text">Нажимая кнопку, ты соглашаешься беречь природу вместе с нами 🌍</p>
</div>

</body>
</html>
