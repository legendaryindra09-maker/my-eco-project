<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель | ECO-UZB</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: sans-serif; padding: 40px; }
        table { width: 100%; border-collapse: collapse; background: #161616; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #00f2fe; color: black; text-transform: uppercase; font-size: 12px; }
        .points-pill { background: #333; padding: 3px 10px; border-radius: 10px; color: #00f2fe; }
        h1 { color: #00f2fe; }
    </style>
</head>
<body>
    <h1>Управление волонтерами</h1>
    <p>Всего баллов в системе: <strong>{{ total_points }}</strong></p>
    
    <table>
        <thead>
            <tr>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Ранг</th>
                <th>Баллы</th>
                <th>Дата</th>
            </tr>
        </thead>
        <tbody>
            {% for v in volunteers %}
            <tr>
                <td>{{ v.name }}</td>
                <td>{{ v.phone }}</td>
                <td>{{ v.get_rank() }}</td>
                <td><span class="points-pill">{{ v.points }}</span></td>
                <td>{{ v.time_joined }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
