<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ article.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; line-height: 1.8; }
        .header-img { width: 100%; height: 50vh; object-fit: cover; }
        .content { max-width: 800px; margin: -50px auto 100px; background: #0a0a0a; padding: 50px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        h1 { font-size: 40px; color: #00f2fe; margin-top: 0; }
        .back-link { display: block; margin-bottom: 30px; color: #555; text-decoration: none; }
    </style>
</head>
<body>
    <img src="{{ article.image_url }}" class="header-img">
    <div class="content">
        <a href="/" class="back-link">← Назад к новостям</a>
        <small style="color: #555;">Опубликовано: {{ article.date_added }}</small>
        <h1>{{ article.title }}</h1>
        <div>{{ article.content }}</div>
    </div>
</body>
</html>
