<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ article.title }} | ECO-UZB</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; line-height: 1.8; }
        .hero-img { width: 100%; height: 45vh; object-fit: cover; border-bottom: 2px solid #00f2fe; }
        .content-box { max-width: 800px; margin: -60px auto 100px; background: #0a0a0a; padding: 50px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .back-btn { display: inline-block; padding: 10px 20px; background: rgba(255,255,255,0.05); color: white; text-decoration: none; border-radius: 50px; margin-bottom: 30px; font-size: 14px; transition: 0.3s; }
        .back-btn:hover { background: #00f2fe; color: black; }
        h1 { font-size: 38px; margin: 10px 0 30px; color: white; line-height: 1.2; }
        .text-body { font-size: 18px; color: #ccc; }
    </style>
</head>
<body>
    <img src="{{ article.image_url }}" class="hero-img">
    <div class="content-box">
        <a href="/" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Назад к статьям</a>
        <div style="color: #00f2fe; font-weight: bold; font-size: 14px;">{{ article.date_added }}</div>
        <h1>{{ article.title }}</h1>
        <div class="text-body">{{ article.content }}</div>
    </div>
</body>
</html>
